name: Publish NPM Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish"
        required: true
        default: "0.2.1"

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use latest npm for trusted publishing
        run: |
          set -euo pipefail
          npm install -g npm@latest
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify requested version
        run: |
          set -euo pipefail
          actual="$(node -p "require('./package.json').version")"
          test "$actual" = "${{ inputs.version }}"

      - name: Test
        run: npm test

      - name: Dry-run package
        run: npm pack --dry-run --json

      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --notes "Release lazycodex-ai@${{ inputs.version }}"
